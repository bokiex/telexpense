<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Telexpense</title>
    <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Telexpense</h1>
          <p id="monthLabel"></p>
        </div>
        <input id="monthInput" type="month" aria-label="Month" />
      </header>

      <section class="metric-grid" aria-label="Monthly overview">
        <article>
          <span>Spent</span>
          <strong id="totalSpent">$0.00</strong>
        </article>
        <article>
          <span>Budget Used</span>
          <strong id="budgetUsed">0%</strong>
        </article>
        <article>
          <span>Transactions</span>
          <strong id="transactionCount">0</strong>
        </article>
      </section>

      <section class="panel">
        <div class="section-title">
          <h2>Category Spend</h2>
        </div>
        <canvas id="categoryChart" width="700" height="320" aria-label="Category spend chart"></canvas>
      </section>

      <section class="panel">
        <div class="section-title">
          <h2>Daily Trend</h2>
        </div>
        <canvas id="dailyChart" width="700" height="260" aria-label="Daily spend chart"></canvas>
      </section>

      <section class="panel">
        <div class="section-title">
          <h2>Budgets</h2>
        </div>
        <div id="budgets" class="budget-list"></div>
      </section>

      <section class="panel">
        <div class="section-title">
          <h2>Recent</h2>
        </div>
        <div id="recent" class="recent-list"></div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
